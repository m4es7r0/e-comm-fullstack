services:
  postgres:
    image: postgres:16-alpine
    container_name: ecomm-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecomm
      POSTGRES_PASSWORD: ecomm_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecomm -d ecommerce']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecomm-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ecomm-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the default bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: ecomm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/ecommerce-assets --ignore-existing;
        mc anonymous set download local/ecommerce-assets;
        echo 'MinIO bucket initialized';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
